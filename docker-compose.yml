name: malh

services:
  db:
    image: mysql:8.0
    container_name: malh-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: malh
      MYSQL_USER: malh_user
      MYSQL_PASSWORD: malh_pass
      MYSQL_ROOT_PASSWORD: root_pass
      TZ: Asia/Seoul
    volumes:
      - malh_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_pass || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
    container_name: malh-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://malh_user:malh_pass@db:3306/malh?charset=utf8mb4
      TZ: Asia/Seoul
    expose:
      - "8000"
    volumes:
      - ./storage:/app/storage
      - ./uploads:/app/uploads

  caddy:
    image: caddy:2
    container_name: malh-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "18080:80/tcp"
      - "18443:443/tcp"
      - "18443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  malh_mysql_data:
  caddy_data:
  caddy_config: